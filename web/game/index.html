<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dungeon Crawler (WASM)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:monospace;background:#111;color:#ddd;padding:12px}
    #output{white-space:pre;padding:12px;height:600px;overflow:auto;background:#000;color:#0f0;border:1px solid #333}
    #notice{margin:12px 0;color:#f88}
  </style>
</head>
<body>
  <h1>Dungeon Crawler (WASM)</h1>
  <div id="output">Console output will appear here.</div>
  <div id="notice"></div>

  <script>
    // Try to load the emscripten-generated JS loader if present.
    (function(){
      var scriptUrl = 'dungeoncrawler_wasm.js';
      fetch(scriptUrl, {method: 'HEAD'})
      .then(function(resp){
        if (!resp.ok) throw new Error('not found');
        var s = document.createElement('script');
        s.src = scriptUrl;
        s.onload = function(){ console.log('WASM loader loaded'); };
        s.onerror = function(){ document.getElementById('notice').textContent = 'Failed to load the generated JS loader.'; };
        document.body.appendChild(s);
      })
      .catch(function(){
        document.getElementById('notice').textContent = 'No WASM build found here. Build with Emscripten (see README).';
      });
    })();
  </script>
</body>
</html>
